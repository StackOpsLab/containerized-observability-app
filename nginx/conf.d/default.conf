# Public virtual host — port 80. Proxies to upstream flask_backend (see conf.d/upstream.conf).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    limit_req_status 429;
    proxy_http_version 1.1;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Default site: moderate rate limit (see general_limit in nginx.conf).
    location / {
        limit_req zone=general_limit burst=100 nodelay;
        proxy_pass http://flask_backend;
    }

    # API routes: stricter limit to protect the database and application logic.
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://flask_backend;
    }

    # No limit_req here — avoids throttling Docker/liveness checks that hit /health on the apps directly;
    # through NGINX, /health is still cheap (access_log off only).
    location /health {
        proxy_pass http://flask_backend;
        access_log off;
    }

    location /ready {
        proxy_pass http://flask_backend;
        access_log off;
    }
}
