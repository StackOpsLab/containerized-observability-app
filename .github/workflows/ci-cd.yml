name: CI / CD

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare executable scripts
        run: chmod +x scripts/*.sh

      - name: Validate Docker Compose
        run: docker compose config

      - name: Validate Python syntax
        run: python3 -m py_compile app/main.py loadtest/load_test.py

      - name: Validate shell scripts
        run: |
          bash -n scripts/backup_postgres.sh
          bash -n scripts/smoke_test.sh

  smoke-deploy:
    name: Smoke Deploy
    runs-on: ubuntu-latest
    needs: validate
    env:
      NGINX_HTTP_PORT: 8088
      BASE_URL: http://localhost:8088

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare executable scripts
        run: chmod +x scripts/*.sh

      - name: Start full stack
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Run smoke test
        run: ./scripts/smoke_test.sh

      - name: Exercise bundled load tester
        run: |
          docker compose --profile loadtest run --rm --no-deps \
            -e LOAD_DURATION=10 \
            -e LOAD_CONCURRENCY=8 \
            -e LOAD_INTERVAL=0.05 \
            -e LOAD_TIMEOUT=5 \
            loadtester

      - name: Show service status on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans

  publish-app-image:
    name: Publish App Image
    runs-on: ubuntu-latest
    needs: smoke-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/containerized-observability-app
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and publish app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
