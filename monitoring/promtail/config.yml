server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      # Drop Prometheus node exporter and other metrics-only containers to reduce noise
      - source_labels: ['__meta_docker_container_name']
        regex: '.*(prometheus|node-exporter|grafana|loki|promtail).*'
        action: drop
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        replacement: '$1'
        target_label: 'job'
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
      - labels:
          level:
          logger:
      - timestamp:
          source: time
          format: RFC3339
      - output:
          source: message