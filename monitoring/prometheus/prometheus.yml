global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'flask-app'
    static_configs:
      - targets: ['app:8000']          # Flask /metrics endpoint from Member C
        labels:
          service: 'flask'

  - job_name: 'nginx-exporter'
    static_configs:
      - targets: ['nginx-exporter:9113']  # NGINX metrics exporter (Member A must expose)
        labels:
          service: 'nginx'

  # optional: add node_exporter if you want host/container sys metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']