services:
  app:
    build:
      context: ./app
    image: sna-flask-app:latest
    environment:
      APP_NAME: ${APP_NAME:-sna-demo-app}
      PORT: ${PORT:-8000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-app_password}@postgres:5432/${POSTGRES_DB:-app_db}
      DB_CONNECT_RETRIES: ${DB_CONNECT_RETRIES:-20}
      DB_CONNECT_DELAY: ${DB_CONNECT_DELAY:-2}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-10}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app_user} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  loadtester:
    build:
      context: ./loadtest
    image: sna-loadtester:latest
    environment:
      TARGET_URL: ${TARGET_URL:-http://app:8000}
      LOAD_DURATION: ${LOAD_DURATION:-120}
      LOAD_CONCURRENCY: ${LOAD_CONCURRENCY:-20}
      LOAD_INTERVAL: ${LOAD_INTERVAL:-0.05}
      LOAD_WRITE_RATIO: ${LOAD_WRITE_RATIO:-0.35}
    depends_on:
      app:
        condition: service_started
    profiles:
      - loadtest

volumes:
  postgres_data:

